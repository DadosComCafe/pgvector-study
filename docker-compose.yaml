version: "3.3"
services:
  postgres_vector:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "senha"
      PORT : "5432"
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_volume:/var/lib/postgres
      - ./sql/create_table.sql:/docker-entrypoint-initdb.d/create_table.sql

volumes:
  postgres_volume: